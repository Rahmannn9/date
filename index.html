<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Love Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 4em;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        .subtitle {
            font-size: 1.5em;
            color: #ffe6e6;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .countdown {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .countdown-title {
            font-size: 1.2em;
            color: #c44569;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .countdown-boxes {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .time-box {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            min-width: 80px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .time-box span {
            display: block;
            font-size: 2em;
            font-weight: bold;
        }

        .time-label {
            font-size: 0.9em;
            margin-top: 5px;
            opacity: 0.9;
        }

        .subscription {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            margin: 0 auto;
        }

        .subscription-title {
            font-size: 1.3em;
            color: #c44569;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .subscription-text {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="email"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #ff6b9d;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #c44569;
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.3);
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Floating Hearts */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            font-size: 2em;
            opacity: 0.7;
            animation: float-up 6s infinite;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .success-message {
            display: none;
            color: #27ae60;
            font-weight: bold;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }

            .subtitle {
                font-size: 1.2em;
            }

            .countdown-boxes {
                gap: 10px;
            }

            .time-box {
                min-width: 70px;
                padding: 15px;
            }

            .time-box span {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="container">
        <h1>❤️ Something Special is Coming ❤️</h1>
        <p class="subtitle">Get ready for love...</p>

        <div class="countdown">
            <div class="countdown-title">Countdown to Launch</div>
            <div class="countdown-boxes">
                <div class="time-box">
                    <span id="days">0</span>
                    <div class="time-label">Days</div>
                </div>
                <div class="time-box">
                    <span id="hours">0</span>
                    <div class="time-label">Hours</div>
                </div>
                <div class="time-box">
                    <span id="minutes">0</span>
                    <div class="time-label">Minutes</div>
                </div>
                <div class="time-box">
                    <span id="seconds">0</span>
                    <div class="time-label">Seconds</div>
                </div>
            </div>
        </div>

        <div class="subscription">
            <div class="subscription-title">Stay in the Loop</div>
            <p class="subscription-text">Be the first to know when we launch</p>
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Enter your email">
                <button onclick="subscribe()">Subscribe</button>
            </div>
            <div class="success-message" id="successMessage">✓ Thank you for subscribing!</div>
        </div>
    </div>

    <script>
        // Countdown Timer
        function updateCountdown() {
            const launchDate = new Date("2026-12-31T00:00:00").getTime();
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance > 0) {
                document.getElementById("days").textContent = Math.floor(distance / (1000 * 60 * 60 * 24));
                document.getElementById("hours").textContent = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("minutes").textContent = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("seconds").textContent = Math.floor((distance % (1000 * 60)) / 1000);
            } else {
                document.querySelector('.countdown').innerHTML = '<div class="countdown-title">We are Live! ❤️</div>';
            }
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // Email Subscription
        function subscribe() {
            const email = document.getElementById("emailInput").value;
            if (email) {
                document.getElementById("successMessage").style.display = "block";
                document.getElementById("emailInput").value = "";
                setTimeout(() => {
                    document.getElementById("successMessage").style.display = "none";
                }, 3000);
            }
        }

        // Allow Enter key to subscribe
        document.getElementById("emailInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                subscribe();
            }
        });

        // Floating Hearts Animation
        const heartsContainer = document.getElementById("heartsContainer");
        const hearts = ["❤️", "💕", "💖", "💗", "💓", "💞"];

        function createFloatingHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + "%";
            heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
            heart.style.animationDelay = Math.random() * 0.5 + "s";
            
            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 8000);
        }

        // Create hearts at intervals
        setInterval(createFloatingHeart, 500);

        // Create initial hearts
        for (let i = 0; i < 5; i++) {
            setTimeout(createFloatingHeart, i * 100);
        }
    </script>
</body>
</html>
